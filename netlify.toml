[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 3000
  framework = "#custom"

[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"

[[redirects]]
  from = "/api/projects"
  to = "/.netlify/functions/projects"
  status = 200

[[redirects]]
  from = "/api/groups"
  to = "/.netlify/functions/groups"
  status = 200

[[redirects]]
  from = "/api/drawings"
  to = "/.netlify/functions/drawings"
  status = 200

[[redirects]]
  from = "/api/factory"
  to = "/.netlify/functions/factory"
  status = 200

[[redirects]]
  from = "/api/settings"
  to = "/.netlify/functions/settings"
  status = 200

[[redirects]]
  from = "/api/init"
  to = "/.netlify/functions/init"
  status = 200

[[redirects]]
  from = "/api/auth"
  to = "/.netlify/functions/auth"
  status = 200

[[redirects]]
  from = "/api/users"
  to = "/.netlify/functions/users"
  status = 200

# SPA fallback（必須放最後）
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
